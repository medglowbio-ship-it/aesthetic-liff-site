<html lang="zh-TW">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>艾絲柏美學診所 · 療程介紹</title>

<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F3EE;
  --warm-white: #FDFAF6;
  --ink: #1A1714;
  --ink-soft: #3D3830;
  --ink-muted: #7A7169;
  --gold: #B8965A;
  --gold-light: #D4B483;
  --gold-pale: #F0E5D0;
  --rose: #C4827A;
  --teal: #4A7B7A;
  --border: rgba(26,23,20,0.1);
  --border-gold: rgba(184,150,90,0.3);
  --shadow: 0 2px 20px rgba(26,23,20,0.08);
  --radius: 14px;
  --font-serif: 'Noto Serif TC', serif;
  --font-sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-sans);
  background: var(--cream);
  color: var(--ink);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--warm-white);
  border-bottom: 1px solid var(--border-gold);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
}
.header-logo-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  display: inline-block;
  margin-right: 8px;
  vertical-align: middle;
}

/* ── Tab bar ── */
.tab-bar {
  display: flex;
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  gap: 4px;
}
.tab-btn {
  flex: 1;
  padding: 11px 4px 10px;
  border: none;
  background: none;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
}
.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  font-weight: 500;
}

/* ── Views ── */
.view { display: none; padding-bottom: 100px; }
.view.active { display: block; }

/* ── Concern view ── */
.concern-intro {
  padding: 24px 20px 16px;
  text-align: center;
}
.concern-intro h2 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.concern-intro p {
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
}

.concern-grid {
  padding: 0 0 20px;
}
.keyword-section {
  padding: 0 16px 18px;
}
.keyword-section-title {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--ink-soft);
  letter-spacing: 0.08em;
  margin: 8px 2px 10px;
}
.keyword-chip-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.keyword-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 36px;
  padding: 8px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--warm-white);
  color: var(--ink-soft);
  font-size: 13px;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
}
.keyword-chip:hover {
  border-color: var(--gold-light);
  background: #fff;
}
.keyword-chip:active { transform: scale(0.96); }
.keyword-count {
  color: var(--gold);
  font-size: 11px;
}

/* ── Browse view ── */
.category-list {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.category-item {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s;
}
.category-item:hover { border-color: var(--gold-light); }
.category-item:active { transform: scale(0.98); }
.cat-left { display: flex; align-items: center; gap: 12px; }
.cat-icon { font-size: 20px; }
.cat-name {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
}
.cat-count {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 2px;
}
.cat-arrow { color: var(--gold-light); font-size: 16px; }

/* ── Panel (sub-cat & treatments) ── */
.panel {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--cream);
  z-index: 200;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.panel.open { transform: translateX(0); }

.panel-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--warm-white);
  border-bottom: 1px solid var(--border-gold);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--ink-soft);
  flex-shrink: 0;
  transition: background .15s;
}
.back-btn:active { background: var(--gold-pale); }
.panel-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
}

/* Sub-cat chips */
.subcategory-wrap {
  padding: 14px 16px 10px;
}
.subcategory-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  padding: 7px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--warm-white);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-soft);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all .2s;
}
.chip.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--warm-white);
}
.chip:not(.active):hover { border-color: var(--gold-light); }

/* Treatment cards */
.treatment-list {
  padding: 10px 16px 110px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.treatment-card {
  background: var(--warm-white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.treatment-card:active { transform: scale(0.98); }
.treatment-card:hover { border-color: var(--gold-light); box-shadow: var(--shadow); }
.treatment-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
.treatment-card-body { flex: 1; min-width: 0; }
.treatment-card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}
.treatment-name {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.05em;
  margin-bottom: 3px;
}
.treatment-device {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}
.treatment-desc-short {
  font-size: 12px;
  color: var(--ink-muted);
  line-height: 1.6;
  letter-spacing: 0.02em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.treatment-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}
.tag {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 100px;
  background: var(--gold-pale);
  color: var(--gold);
  letter-spacing: 0.04em;
}
.card-select-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: var(--ink-muted);
  transition: all .2s;
  flex-shrink: 0;
}
.treatment-card.selected .card-select-btn {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
}
.card-detail-arrow {
  font-size: 14px;
  color: var(--gold-light);
}

/* ── Detail Panel ── */
.detail-panel {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--cream);
  z-index: 300;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.detail-panel.open { transform: translateX(0); }

.detail-hero {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border-gold);
  padding: 20px 20px 24px;
}
.detail-device-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--gold);
  border: 1px solid var(--border-gold);
  border-radius: 100px;
  padding: 3px 12px;
  margin-bottom: 10px;
}
.detail-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.08em;
  line-height: 1.4;
  margin-bottom: 12px;
}
.detail-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.detail-tag {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 100px;
  background: var(--gold-pale);
  color: var(--gold);
  letter-spacing: 0.04em;
}

.detail-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 110px; }

.detail-section-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.detail-section-text {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.9;
  letter-spacing: 0.03em;
}
.detail-divider {
  height: 1px;
  background: var(--border-gold);
}
.detail-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.detail-info-item {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.detail-info-key {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.detail-info-val {
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
}

.detail-license-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.detail-license-item {
  background: var(--warm-white);
  border: 1px solid var(--border-gold);
  border-radius: 10px;
  padding: 12px 14px;
}
.detail-license-no {
  font-size: 12px !important;
  letter-spacing: 0.06em;
  color: var(--ink-muted) !important;
  font-family: var(--font-sans) !important;
}

/* Detail action bar */
.detail-action-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 310;
  background: var(--warm-white);
  border-top: 1px solid var(--border-gold);
  padding: 12px 16px max(14px, env(safe-area-inset-bottom));
  display: none;
}
.detail-panel.open ~ .detail-action-bar,
.detail-action-bar.visible { display: block; }
.detail-action-bar.visible { display: block; }
.detail-action-inner { display: flex; gap: 10px; }
.detail-add-btn {
  flex: 1;
  padding: 13px;
  border-radius: 10px;
  border: 1.5px solid var(--gold);
  background: transparent;
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all .2s;
}
.detail-add-btn.added {
  background: var(--gold-pale);
}
.detail-consult-btn {
  flex: 1;
  padding: 13px;
  border-radius: 10px;
  border: none;
  background: var(--gold);
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--warm-white);
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background .2s;
}
.detail-consult-btn:active { background: var(--gold-light); }

/* ── Bottom action bar ── */
.action-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 300;
  background: var(--warm-white);
  border-top: 1px solid var(--border-gold);
  padding: 12px 16px max(14px, env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.action-bar.visible { transform: translateY(0); }
.action-bar-inner {
  display: flex;
  align-items: center;
  gap: 12px;
}
.selected-preview {
  flex: 1;
  min-width: 0;
}
.selected-count-label {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.selected-names {
  font-size: 12px;
  color: var(--ink-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.send-btn {
  flex-shrink: 0;
  background: var(--gold);
  color: var(--warm-white);
  border: none;
  border-radius: 10px;
  padding: 12px 22px;
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.send-btn:active { transform: scale(0.96); background: var(--gold-light); }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-muted);
  font-size: 13px;
  letter-spacing: 0.04em;
}

/* ── Divider ── */
.section-divider {
  height: 1px;
  background: var(--border-gold);
  margin: 4px 16px 12px;
}

/* Toast */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--ink);
  color: var(--cream);
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <div class="header-title">
    <span class="header-logo-dot"></span>艾絲柏美學診所
  </div>
  <div style="font-size:11px;color:var(--ink-muted);letter-spacing:0.06em;">療程介紹</div>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('type')">依療程類型</button>
  <button class="tab-btn" onclick="switchTab('concern')">依困擾選擇</button>
</div>

<!-- View: Concern -->
<div class="view" id="view-concern">
  <div class="concern-intro">
    <h2>選擇想改善的關鍵字</h2>
    <p>用更直覺的方式找到適合療程</p>
  </div>
  <div class="concern-grid" id="concern-grid"></div>
</div>

<!-- View: By Type -->
<div class="view active" id="view-type">
  <div class="category-list" id="category-list-type"></div>
</div>

<!-- Panel: Sub-categories + Treatments -->
<div class="panel" id="treatment-panel">
  <div class="panel-header">
    <div class="back-btn" onclick="closePanel()">←</div>
    <div class="panel-title" id="panel-title">療程</div>
  </div>
  <div class="subcategory-wrap" id="subcategory-wrap"></div>
  <div class="section-divider"></div>
  <div class="treatment-list" id="treatment-list"></div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <div class="back-btn" onclick="closeDetail()">←</div>
    <div class="panel-title" id="detail-panel-title">療程詳情</div>
  </div>
  <div class="detail-hero">
    <div class="detail-device-badge" id="detail-device"></div>
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-tags" id="detail-tags"></div>
  </div>
  <div class="detail-body">
    <div id="detail-license-block">
      <div class="detail-section-label">儀器資訊</div>
      <div class="detail-license-grid">
        <div class="detail-license-item">
          <div class="detail-info-key">仿單名稱</div>
          <div class="detail-info-val" id="detail-license-name">—</div>
        </div>
        <div class="detail-license-item">
          <div class="detail-info-key">許可證字號</div>
          <div class="detail-info-val detail-license-no" id="detail-license-no">—</div>
        </div>
      </div>
    </div>
    <div class="detail-divider"></div>
    <div>
      <div class="detail-section-label">療程說明</div>
      <div class="detail-section-text" id="detail-desc"></div>
    </div>
    <div class="detail-divider"></div>
    <div>
      <div class="detail-section-label">適合族群</div>
      <div class="detail-section-text" id="detail-suitable"></div>
    </div>
    <div class="detail-divider"></div>
    <div>
      <div class="detail-section-label">療程資訊</div>
      <div class="detail-info-grid" id="detail-info-grid"></div>
    </div>
    <div class="detail-divider"></div>
    <div>
      <div class="detail-section-label">注意事項</div>
      <div class="detail-section-text" id="detail-notes"></div>
    </div>
  </div>
</div>
<div class="detail-action-bar" id="detail-action-bar">
  <div class="detail-action-inner">
    <button class="detail-add-btn" id="detail-add-btn" onclick="toggleFromDetail()">加入諮詢清單</button>
    <button class="detail-consult-btn" onclick="sendSingleToLine()">立即傳送諮詢</button>
  </div>
</div>

<!-- Bottom action bar -->
<div class="action-bar" id="action-bar">
  <div class="action-bar-inner">
    <div class="selected-preview">
      <div class="selected-count-label" id="selected-count-label">已選擇</div>
      <div class="selected-names" id="selected-names"></div>
    </div>
    <button class="send-btn" onclick="sendToLine()">傳送諮詢</button>
  </div>
</div>

<script>
// ── Data ──
const DATA = {
  categories: [
    {
      id: "skin",
      group: "concern",
      name: "肌膚問題",
      icon: "✦",
      concern: "毛孔、斑點、暗沉、痘疤",
      subcategories: [
        {
          name: "毛孔・膚質",

    notes: "【術前注意事項】\n・施打前請告知醫師過敏史、凝血功能、用藥史、蟹足腫、孕哺狀態及過往眼周填充或手術紀錄。\n・眼周若有感染、發炎、過敏、傷口、近期雷射或手術，需待穩定後再評估。\n・療程前一週避免飲酒及可能增加瘀青的藥物或保健品，必要用藥請先詢問醫師。\n・淚溝與眼周血管豐富，請與醫師確認適合劑量、層次及預期改善程度。\n\n【術後注意事項】\n・術後可能有針孔、浮腫、瘀青、壓痛或短暫不平整，多數數日至兩週內緩解。\n・術後 24 小時內避免上妝、揉眼、飲酒、劇烈運動與碰觸針孔。\n・術後一週內避免眼周按摩、熱敷、三溫暖、趴睡或壓迫眼周。\n・若出現劇痛、皮膚變白或發紫、視力異常、感染或腫脹持續惡化，請立即回診。"

    desc: "眼袋手術是改善中重度眼袋最根本、效果最持久的醫療方式，透過精準的外科操作，直接處理造成眼袋突出的根本原因——眼眶脂肪膨出及眼周皮膚鬆弛，讓眼周恢復清爽平整、年輕有神的外觀。手術在局部麻醉下進行，依個人眼袋嚴重程度與皮膚鬆弛狀況，可分為「內開法」與「外開法」兩種術式，或視情況合併脂肪回填及修除贅皮等進階處理，由醫師術前評估後量身規劃最適合的手術方案。\n\n▍內開法（結膜切開法）\n內開法是從下眼皮內側的結膜面（眼白與眼皮交界處）切開，在不破壞外側皮膚的情況下，將突出的眼眶脂肪取出或重新分布，術後結膜面的切口會自然癒合，外側皮膚完全無傷口、無縫線，幾乎看不出任何手術痕跡。適合眼袋以脂肪膨出為主、皮膚彈性尚佳、鬆弛程度輕微的族群，術後腫脹恢復較快，約 1 至 2 週即可大致恢復，是年輕化且傷口極小的術式首選。\n\n▍外開法（皮膚切開法）\n外開法是沿下睫毛緣約 1 至 2mm 處作切口，打開皮膚與眼輪匝肌層後，處理眼眶脂肪並同步修除鬆弛多餘的眼皮皮膚，最後以極細縫線縫合，術後縫線痕跡會隨時間淡化並隱藏於睫毛緣。適合眼袋嚴重、皮膚鬆弛明顯、淚溝較深或需同步處理細紋的族群。外開法可一次性處理脂肪膨出與皮膚鬆弛兩個問題，效果更全面持久，但腫脹期相對較長，約需 2 至 4 週恢復，最終效果約 1 個月後呈現。\n\n▍脂肪回填（眶脂轉移）\n對於同時有淚溝凹陷或眼眶凹陷問題的求診者，手術中可選擇「脂肪回填」技術，將取出的眼眶脂肪不全部移除，而是將部分脂肪往下翻轉填入淚溝凹陷處，以自體脂肪填補眼眶下方的空洞感，達到同時去除眼袋突出、又填補淚溝凹陷的雙重效果。自體脂肪不會引起異物排斥反應，效果自然且持久，特別適合有「眼袋突出＋淚溝深凹」複合型老化問題的族群，可避免術後呈現的「眼袋雖消、眼眶更空洞」的視覺落差。\n\n▍修除贅皮\n年齡較大或眼皮鬆弛程度較重者，除了脂肪膨出外，多餘鬆弛的眼周皮膚也是造成疲憊感的主因。外開法手術中可同步評估修除適量的贅皮，使下眼皮恢復緊緻平滑的弧度，有效改善眼皮皺折、細紋及下眼皮鬆弛感。贅皮修除量需精準拿捏，避免修除過多造成眼皮外翻（ectropion），因此需由經驗豐富的醫師評估操作。\n\n手術時間約 60 至 90 分鐘，術後建議冰敷 48 小時內，1 個月內避免揉眼及劇烈運動，服用抗凝血劑者請提前告知。效果長效持久，通常無需再次手術。",
    suitable: "中重度眼袋、皮膚鬆弛明顯者；希望一次性永久改善眼袋者。",
    info: [{ k: "手術時間", v: "約 60–90 分鐘" }, { k: "恢復期", v: "7–14 天明顯腫脹" }, { k: "效果", v: "長效持久" }, { k: "麻醉方式", v: "局部麻醉" }],
    notes: "【術前注意事項】\n・手術前請完整告知病史、過敏史、用藥史、凝血功能、蟹足腫體質與過往眼部手術紀錄。\n・服用抗凝血藥、阿斯匹靈、魚油、銀杏或維他命 E 者，請依醫師指示評估是否暫停。\n・若眼周有感染、結膜炎、皮膚炎、傷口或近期雷射注射，需先治療穩定。\n・術前請與醫師確認手術方式、疤痕位置、恢復期、可能瘀青腫脹與不對稱風險。\n\n【術後注意事項】\n・術後請依醫囑冰敷、換藥、用藥與回診，保持傷口清潔乾燥。\n・術後可能腫脹、瘀青、緊繃或暫時不對稱，通常數週內逐漸自然。\n・術後一至兩週避免揉眼、化眼妝、隱形眼鏡、劇烈運動、飲酒及高溫環境。\n・若出現劇痛、視力異常、出血不止、傷口化膿或腫脹快速惡化，請立即回診。"
  },
  "縫/割雙眼皮": {
    licenseName: "（不適用，屬手術項目）",
    licenseNo: "（不適用）",
    desc: "縫/割雙眼皮是依照眼皮厚度、脂肪量、眉眼距離、眼裂長度、眼窩深淺、提眼瞼肌力量與個人期待，設計適合的雙眼皮摺痕與眼型比例。療程重點不是把摺痕做得越高越明顯，而是在睜眼、閉眼、低頭與表情活動時都能維持自然協調，避免過寬、過深或不符合五官比例。\n\n▍縫雙眼皮\n縫合法又稱埋線雙眼皮，透過小針孔或微小切口將眼皮與提眼組織建立固定點，形成雙眼皮摺痕。優點是傷口小、恢復較快、腫脹期較短，適合眼皮較薄、脂肪不多、皮膚鬆弛不明顯，且希望自然摺痕的人。限制是固定力相對切開法較弱，若眼皮厚重、泡泡眼或長期揉眼，可能有摺痕變淺或鬆脫風險。\n\n▍割雙眼皮\n切開法是沿設計線切開上眼皮，視情況去除多餘皮膚、脂肪或調整組織固定，形成較穩定的雙眼皮線條。適合眼皮較厚、脂肪較多、皮膚鬆弛、摺痕不穩或曾縫雙眼皮鬆脫者。切開法可處理的問題較完整，但腫脹期較長，疤痕淡化與摺痕自然化需要數週至數月。\n\n▍療程規劃\n術前會先模擬摺痕高度與眼型，評估是否需要合併開眼頭、修皮、取脂或提眼瞼肌調整。手術多在局部麻醉下進行，時間約 40 至 90 分鐘。術後前 48 小時以冰敷為主，後續依醫囑改溫敷與回診。雙眼皮初期可能較腫、較高或左右不完全一致，通常會隨消腫逐漸自然。",
    suitable: "單眼皮、內雙、雙眼皮摺痕不穩、眼皮厚重或希望改善眼型比例者。",
    info: [{ k: "手術時間", v: "約 40–90 分鐘" }, { k: "恢復期", v: "明顯腫脹約 1–2 週" }, { k: "麻醉方式", v: "多為局部麻醉" }, { k: "效果穩定", v: "約 1–3 個月逐漸自然" }],
    notes: "【術前注意事項】\n・術前需由醫師評估眼皮厚度、脂肪量、皮膚鬆弛程度、提眼瞼肌力量、眉眼距離與左右眼差異，確認適合縫合法、切開法或合併其他眼整形。\n・請完整告知過敏史、用藥史、蟹足腫體質、凝血功能異常、乾眼症、甲狀腺眼病變、青光眼或曾接受眼部手術等狀況。\n・術前一至二週避免飲酒、抽菸，並依醫師指示停用抗凝血藥物、阿斯匹靈、魚油、銀杏、維他命 E 等可能增加出血風險的藥物或保健品。\n・手術當日請勿配戴隱形眼鏡、假睫毛、雙眼皮貼或眼妝，保持臉部清潔，並安排術後返家交通。\n・若近期眼部感染、結膜炎、嚴重過敏或皮膚發炎，應先治療穩定後再安排手術。\n\n【術後注意事項】\n・術後腫脹、瘀青、緊繃、暫時性左右不完全對稱屬常見恢復過程，請依醫囑冰敷、服藥與回診。\n・術後一週內避免揉眼、低頭太久、劇烈運動、提重物、飲酒、辛辣飲食與高溫環境，以免加重腫脹或出血。\n・傷口保持乾燥清潔，未經醫師同意勿自行塗抹來路不明藥膏或保養品；拆線前避免眼妝與隱形眼鏡。\n・睡覺時可墊高頭部幫助消腫，避免趴睡或壓迫眼部。\n・若出現劇烈疼痛、視力異常、大量出血、傷口化膿、發燒或腫脹快速惡化，請立即聯絡醫療團隊。"
  },
  "提眼瞼肌": {
    licenseName: "（不適用，屬手術項目）",
    licenseNo: "（不適用）",
    desc: "提眼瞼肌手術是針對提上眼瞼肌力量不足或眼皮下垂造成的睜眼無力、眼神疲憊、大小眼、額頭代償抬眉等問題進行矯正。許多人以為只是雙眼皮不明顯，但真正原因可能是提眼肌收縮力不足，導致黑眼珠被遮住、眼睛看起來沒精神，甚至需要用額頭出力才能睜大眼睛。\n\n▍治療原理\n手術會依眼瞼下垂程度與肌肉功能，調整提眼瞼肌或相關筋膜結構，使上眼皮能被更有效地抬起。若同時有單眼皮、內雙或皮膚鬆弛，常會合併雙眼皮設計，讓功能改善與外觀線條一起規劃。目標是讓眼睛自然張開、黑眼珠露出比例更協調，而不是單純把雙眼皮做深。\n\n▍適合族群\n適合睜眼容易疲勞、眼神看起來無力、拍照常被說沒睡醒、左右眼大小差明顯、長期抬眉造成抬頭紋，或雙眼皮手術後仍覺得眼睛張不開的人。若屬於神經性、肌肉疾病或先天嚴重眼瞼下垂，需由醫師進一步評估手術方式與預期改善幅度。\n\n▍療程規劃\n術前會評估眼裂高度、黑眼珠露出比例、提眼瞼肌功能、眉毛位置、額頭代償、乾眼狀況與雙眼平衡。手術多在局部麻醉下進行，時間約 60 至 120 分鐘。術後初期可能有腫脹、閉眼不全、乾澀或左右差，需依醫囑使用藥膏或人工淚液並定期追蹤。最終眼型與肌力穩定通常需要數週至數月。",
    suitable: "眼瞼下垂、睜眼無力、大小眼、額頭代償抬眉或眼神疲憊者。",
    info: [{ k: "手術時間", v: "約 60–120 分鐘" }, { k: "恢復期", v: "明顯腫脹約 1–2 週" }, { k: "麻醉方式", v: "多為局部麻醉" }, { k: "追蹤重點", v: "眼瞼高度與閉眼功能" }],
    notes: "【術前注意事項】\n・術前需由醫師評估提眼瞼肌功能、眼瞼下垂程度、黑眼珠露出比例、眉毛代償、乾眼狀況與左右眼差異。\n・請完整告知眼部疾病、乾眼症、甲狀腺疾病、重症肌無力、神經肌肉疾病、糖尿病、凝血異常、過敏史與過往眼部手術史。\n・術前一至二週避免飲酒、抽菸，並依醫師指示停用抗凝血藥物、阿斯匹靈、魚油、銀杏、維他命 E 等可能增加出血風險的藥物或保健品。\n・手術當日請勿配戴隱形眼鏡、假睫毛或眼妝，若平時有使用人工淚液或眼藥水，請攜帶並告知醫師。\n・若近期有眼部感染、結膜炎、角膜受傷或嚴重過敏，應先治療穩定後再安排手術。\n\n【術後注意事項】\n・術後腫脹、瘀青、眼皮緊繃、暫時性左右差或閉眼不全可能發生，請依醫囑冰敷、服藥、點眼藥水或使用眼藥膏。\n・術後需特別注意眼睛乾澀與角膜保護，若閉眼不完全，睡前應依醫囑加強潤滑與保護。\n・術後一週內避免揉眼、劇烈運動、低頭太久、提重物、飲酒、辛辣飲食與高溫環境。\n・傷口保持清潔乾燥，未經醫師同意勿自行按摩眼皮或調整摺痕，並按時回診追蹤眼瞼高度與閉眼功能。\n・若出現視力模糊加劇、劇烈疼痛、角膜刺痛、分泌物增加、傷口化膿、發燒或腫脹快速惡化，請立即聯絡醫療團隊。"

    desc: "假體隆乳手術是透過植入乳房假體，改善胸部大小、形狀、上胸飽滿度、左右不對稱與身形比例的整形外科手術。療程並非單純追求罩杯增加，而是依照胸廓寬度、乳房底盤、皮膚彈性、乳頭位置、肩腰臀比例與個人期待，規劃適合的胸型、假體尺寸與安全容量。\n\n▍療程特色\n假體隆乳可提供較穩定、明確的尺寸與形狀改善，適合本身脂肪量不足、希望胸型提升較明顯，或想改善上胸空虛、產後萎縮者。常見植入層次包含胸大肌下、筋膜下或雙平面，切口可依條件選擇腋下、乳暈或乳下緣。實際假體尺寸、材質、形狀與植入層次須由醫師依解剖條件評估，過大假體可能增加邊緣感、位移、莢膜攣縮或皮膚負擔。\n\n▍適合族群\n適合希望胸型改善較明確、脂肪量不足不適合大量補脂、產後或減重後上胸流失、胸型不對稱，或希望一次達到較穩定尺寸變化者。若期待非常自然柔軟且只需小幅增加，也可與醫師討論是否搭配自體脂肪修飾邊緣。\n\n▍療程規劃\n術前會進行身形評估、胸部測量、病史與用藥確認，必要時安排抽血、心電圖、胸部或乳房相關檢查。手術多於麻醉下進行，時間約 2 至 4 小時，術後需穿著支撐內衣並定期回診。初期腫脹、緊繃與位置偏高屬常見恢復過程，胸型通常需數週至數月逐漸穩定。",

    notes: "【術前注意事項】\n・術前需由醫師完整評估胸型、皮膚彈性、胸廓比例、乳房疾病史、家族病史與期待尺寸，確認適合假體、自體脂肪或複合式規劃。\n・請完整告知用藥史、過敏史、蟹足腫體質、凝血功能異常、慢性疾病、懷孕或哺乳狀態。\n・術前依醫囑安排抽血、心電圖、影像或乳房相關檢查；若近期乳房有腫塊、疼痛、分泌物或異常影像，需先完成專科評估。\n・術前一至二週避免飲酒、抽菸，並依醫師指示停用抗凝血藥物、阿斯匹靈、魚油、銀杏、維他命 E 等可能增加出血風險的藥物或保健品。\n・手術前需遵守禁食禁水規定，手術當日勿配戴飾品、隱形眼鏡或塗抹乳液，並安排親友陪同返家。\n\n【術後注意事項】\n・術後胸部腫脹、緊繃、瘀青、壓痛或活動受限屬常見恢復現象，請依醫囑服藥、冰敷或照護傷口。\n・術後需依醫囑穿著支撐內衣或束帶，勿自行按摩、拉扯或調整假體位置；是否按摩須依假體種類與醫師指示而定。\n・術後一至二週避免提重物、抬高手臂、趴睡、劇烈運動與上半身大幅度活動，恢復運動需經醫師同意。\n・傷口保持乾燥清潔，避免泡澡、游泳、三溫暖與高溫環境，並按時回診拆線或檢查。\n・若出現單側胸部快速腫大、劇烈疼痛、發燒、傷口滲液、皮膚發紅發熱、呼吸不適或其他異常，請立即聯絡醫療團隊。"

    licenseName: "（不適用，屬手術項目）",
    licenseNo: "（不適用）",
    desc: "自體脂肪隆乳手術是從腹部、腰側、大腿等脂肪較多部位抽取自身脂肪，經過純化處理後分層回填至胸部，用來改善胸部飽滿度、柔軟度與自然比例。它同時結合抽脂與補脂概念，可在增加胸部自然豐盈感的同時，修飾取脂部位線條。\n\n▍療程特色\n自體脂肪隆乳不使用假體，觸感相對自然，也不會有假體邊緣感或莢膜攣縮問題。適合希望胸型自然升級、只需要小到中幅度增加、且身體有足夠脂肪可供抽取者。脂肪回填後會有一段吸收期，最終存活率受個人體質、抽脂與純化方式、回填層次、術後照護與生活習慣影響，因此不適合期待一次大幅增加多個罩杯的人。\n\n▍適合族群\n適合胸部輕中度扁平、上胸流失、產後萎縮、希望自然觸感，且腹部、腰側或大腿有可取脂肪者。若本身非常瘦、脂肪量不足，或期待明顯尺寸提升，可能需由醫師評估假體隆乳或複合式隆乳。\n\n▍療程規劃\n術前會評估胸型、皮膚彈性、脂肪可抽取量、取脂部位線條與期望尺寸。手術通常包含抽脂、脂肪處理與分層回填，時間約 2 至 4 小時。術後取脂區需穿塑身衣，胸部則需避免過度壓迫。初期會有腫脹與部分脂肪吸收，胸型穩定通常需要 3 至 6 個月，必要時可分次補脂。",

    notes: "【術前注意事項】\n・術前需由醫師評估胸部條件、皮膚彈性、脂肪可抽取量、取脂部位、體重穩定度與期望尺寸，確認是否適合自體脂肪隆乳。\n・請完整告知用藥史、過敏史、凝血功能異常、慢性疾病、蟹足腫體質、懷孕或哺乳狀態，以及過往胸部手術或乳房疾病史。\n・術前依醫囑安排抽血、心電圖、乳房或其他必要檢查；若近期乳房有腫塊、疼痛、分泌物或異常影像，需先完成專科評估。\n・術前一至二週避免飲酒、抽菸，並依醫師指示停用抗凝血藥物、阿斯匹靈、魚油、銀杏、維他命 E 等可能增加出血風險的藥物或保健品。\n・手術前需遵守禁食禁水規定，手術當日穿著寬鬆衣物，並安排親友陪同返家。\n\n【術後注意事項】\n・術後胸部與取脂部位可能有腫脹、瘀青、痠痛、麻木感或少量組織液滲出，請依醫囑換藥、服藥與回診。\n・取脂部位需依醫囑穿著塑身衣，胸部則避免過度壓迫、趴睡或穿著太緊的內衣，以免影響脂肪存活。\n・術後一至二週避免劇烈運動、泡澡、游泳、三溫暖、飲酒與抽菸；恢復運動需經醫師同意。\n・請維持均衡飲食與穩定體重，避免快速減重影響脂肪存活與胸型穩定。\n・若出現發燒、傷口紅腫熱痛、胸部劇烈疼痛、單側快速腫大、大量出血、呼吸不適或其他異常，請立即聯絡醫療團隊。"

  "抽脂手術": {

    licenseNo: "（不適用）",
    desc: "抽脂手術是針對局部脂肪堆積進行脂肪抽吸與身體線條雕塑的整形外科手術，適合處理即使飲食控制與運動仍不易改善的腹部、腰側、背部、手臂、大腿、臀下、雙下巴等部位。抽脂不是減重手術，主要目標是改善比例、厚度與輪廓線條，術後仍需搭配穩定體重與生活習慣維持效果。\n\n▍手術原理\n醫師會依治療部位標記脂肪分布與希望修飾的線條，在麻醉後透過小切口注入膨脹液，協助止血、降低疼痛並讓脂肪較容易被抽取。接著以抽脂管在皮下脂肪層進行均勻抽吸，減少局部脂肪厚度。依設備與醫師規劃，可能搭配傳統抽脂、水刀、威塑、雷射或電漿等輔助技術，重點仍在於安全層次、均勻度與整體比例。\n\n▍可改善部位\n腹部與腰側可改善腰線、腹部厚度與衣著曲線；手臂可修飾蝴蝶袖；大腿可改善內外側脂肪與摩擦感；背部與副乳區可讓上半身線條更平順；雙下巴則可改善下顎線模糊。若合併皮膚鬆弛，可能需搭配電波、拉皮或其他緊膚療程，單靠抽脂不一定能處理鬆皮。\n\n▍療程規劃\n術前會評估脂肪厚度、皮膚彈性、肌肉與骨架比例、體重穩定度與健康狀況。手術時間依部位與範圍約 1 至 4 小時，術後需穿著塑身衣幫助壓迫、消腫與塑形。腫脹與瘀青通常在前 1 至 2 週較明顯，線條會隨組織修復在 1 至 3 個月逐漸清楚，最終穩定可能需要 3 至 6 個月。",

    notes: "【術前注意事項】\n・術前需由醫師評估 BMI、脂肪厚度、皮膚彈性、慢性疾病、凝血功能與麻醉風險；抽脂不適合作為大量減重替代方案。\n・請完整告知用藥史、過敏史、手術史、蟹足腫體質、貧血、心血管疾病、糖尿病或血栓相關病史。\n・術前依醫囑安排抽血、心電圖或其他必要檢查，並確認治療範圍、預期效果、可能不對稱與皮膚鬆弛限制。\n・術前一至二週避免飲酒、抽菸，並依醫師指示停用抗凝血藥、阿斯匹靈、魚油、銀杏、維他命 E 等可能增加出血風險的藥物或保健品。\n・手術前需遵守禁食禁水規定，手術當日穿著寬鬆衣物，並安排親友陪同返家。\n\n【術後注意事項】\n・術後腫脹、瘀青、痠痛、麻木感與少量組織液滲出屬常見恢復現象，請依醫囑換藥、服藥與回診。\n・術後需依醫囑穿著塑身衣，協助壓迫、減少腫脹與幫助皮膚貼合；勿自行過早停穿或穿著過緊造成循環不良。\n・術後前幾天避免久站久坐，可依醫囑輕度走動促進循環；劇烈運動、重訓、泡澡、游泳、三溫暖需待醫師確認後恢復。\n・請維持均衡飲食、充足水分與穩定體重，避免高鹽飲食造成腫脹加重。\n・若出現發燒、傷口紅腫熱痛、單側肢體明顯腫痛、呼吸困難、胸痛、大量出血或劇烈疼痛，請立即聯絡醫療團隊或就醫。"

    desc: "Letybo 保提拉肉毒由韓國知名藥廠 HUGEL 研發製造，在韓國被稱為「Botulax」，素有「3D 精品肉毒」「輕齡肉毒」之美名。於 2019 年經台灣衛福部核准上市，已行銷包含台灣在內全球近 30 個國家，是韓國市占率第一、連續多年蟬聯韓國肉毒桿菌素銷售冠軍的指標品牌，也是台灣繼美國、英國、德國品牌後的第四大肉毒品牌。\n\n▍A 型肉毒桿菌素作用原理\n保提拉的主要成分為高純度的 A 型肉毒桿菌素，與美國保妥適（Botox）的結構極為相似，皆為經由細菌分泌物質高端純化萃取後產生的純化蛋白質。注射後，肉毒桿菌素會阻斷神經與肌肉之間的乙醯膽鹼神經傳導訊號，使過度收縮的肌肉放鬆，藉此達到兩大效果：（1）撫平動態紋——放鬆因表情牽動而產生的皺眉紋、抬頭紋、魚尾紋等；（2）雕塑肌肉曲線——使過度發達的咀嚼肌、小腿肌等萎縮，達到瘦小臉、瘦肩、瘦小腿的線條修飾效果。\n\n▍專為亞洲人打造的精品肉毒\n保提拉的肉毒桿菌素與外圍保護蛋白結構專為亞洲人體質設計，配方精純穩定，治療效果佳且穩定度高。其最大優勢在於「效價精準穩定」——韓國藥監局規定 100U 的肉毒效價應介於 80～125U，而保提拉的效價範圍嚴格控制在 95～115U，意味著選擇保提拉能更接近真正的 100U 標準劑量，施打效果更可預測。HUGEL 藥廠堅持 100% 人工逐瓶檢視並採自動化生產系統，品質標準比韓國食品藥物管理局（KFDA）更嚴格。來台上市前更經過三軍總醫院、林口長庚等多中心第三期臨床試驗，證實能有效改善中度至重度皺眉紋。\n\n▍適用部位與療程規劃\n衛福部核准適應症為暫時性改善因皺眉肌及鼻眉肌活躍而產生的中度至重度皺眉紋。臨床上廣泛應用於：抬頭紋、皺眉紋、魚尾紋等表情紋（約 15–30U），瘦小臉咬肌（單側約 40–50U），水牛肩（單邊約 50–80U），腋下多汗症（單邊約 50–80U），小腿肌（單邊約 100–150U）。實際劑量須由專業醫師依個人肌肉狀況評估規劃。提供 50U、100U、200U 三種容量規格。\n\n注射過程因肉毒針頭極細，僅有輕微扎針感，是注射類療程中疼痛感相當輕微的選擇，治療時間約 10 至 20 分鐘。效果通常於注射後 5 至 14 天逐漸顯現，可維持約 3 至 6 個月，效果消退後可再次施打維持。提醒務必選擇合法經銷、原廠冷鏈（2–8°C）輸入的保提拉，切勿購買來路不明的平行輸入或仿冒品。",

    info: [{ k: "療程時間", v: "約 10–20 分鐘" }, { k: "恢復期", v: "幾乎無，針點 1–2 天" }, { k: "效果出現", v: "注射後 5–14 天" }, { k: "效果持續", v: "3–6 個月" }],
    notes: "【術前注意事項】\n・若正在服用藥物（如阿斯匹靈、抗凝血劑、肌肉鬆弛劑、抗生素等），施打前請務必告知醫師。\n・患有神經肌肉疾病（如重症肌無力）、肌肉疾病者，施打前請先諮詢醫師評估。\n・孕婦、哺乳中或備孕中女性不適合施打。\n・對肉毒桿菌素或配方成分過敏者不可使用。\n・注射部位有感染、發炎或皮膚疾病者，需待康復後再進行。\n・請選擇合法經銷、原廠冷鏈輸入的保提拉，切勿使用來路不明的平行輸入或仿冒藥品。\n\n【術後注意事項】\n・施打後 4 小時內請保持直立，勿按壓、揉搓或觸摸注射部位，避免肉毒擴散至非治療區域。\n・施打後 4 小時內避免平躺，當日避免劇烈運動及接觸高溫環境（泡溫泉、三溫暖、烤箱）。\n・術後注射部位可能有輕微泛紅、針點或瘀青，屬正常現象，數日內自然消退。\n・效果約於 5 至 14 天逐漸顯現，初期勿因尚未見效而自行追加，請依醫師回診評估。\n・施打後若有異常反應（如眼皮下垂、表情不對稱、呼吸或吞嚥困難），請立即聯絡主治醫師。"

  "Xeomin 德國天使肉毒": {

    desc: "Xeomin 天使肉毒由德國百年莫氏醫學美容 Merz Aesthetics 研發製造，是台灣唯一的「淨化型」肉毒桿菌素。早於 2011 年即獲得美國 FDA 認證，並通過歐盟 CE 及台灣 TFDA 核可，自 2005 年起全球已售出超過 1,800 萬瓶、超過 450 萬人體驗，秉持德國嚴謹製藥精神，以精準、安全、穩定著稱。\n\n▍XTRACT™ 專利淨化科技：台灣唯一淨化型肉毒\n天使肉毒最核心的優勢在於獨創的專利 XTRACT™ 淨化科技。一般肉毒桿菌素產品除了核心活性神經毒素外，還可能含有非活性神經毒素、複合性蛋白質、鞭毛蛋白及雜質等不純物，這些複合蛋白會增加人體產生免疫反應的機率。天使肉毒透過雙重淨化製程，僅保留核心神經毒素，完全去除有害的複合性蛋白與雜質，達到「純淨零雜質」的標準。\n\n▍不易產生抗藥性：適合長期施打者\n為什麼有些人「肉毒越打越沒效」？關鍵就在於不純物中的複合性蛋白質會誘發人體產生中和抗體（NAb），使後續療效逐漸減弱，這就是肉毒抗藥性。由於天使肉毒不含複合性蛋白質，大幅降低免疫反應風險——臨床報告顯示，超過 2,600 位接受天使肉毒治療的患者中，未有任何因產生中和抗體而導致療效減弱的案例；另一份研究中 49 位患者平均治療長達 8.4 年也未產生中和抗體。因此天使肉毒特別推薦給第一次施打、或計畫長期接受肉毒治療的族群，避免越打越無效。\n\n▍精準不擴散，自然快速見效\n天使肉毒的純化配方使其作用精準、不易擴散至非治療區域，能精雕細琢地放鬆目標肌肉，不會造成周圍肌肉僵硬或「眉壓眼」等不自然現象，呈現自然的表情。其起效速度快，平均注射後 2 至 4 天即可展現緊緻效果，單次治療效果可維持約 4 至 6 個月，患者滿意度高達 96%。\n\n▍適用部位\n衛福部核准適應症為暫時性改善成人因皺眉肌及鼻眉肌活躍而出現的中度至重度皺眉紋。經醫師評估後，臨床上亦廣泛應用於抬頭紋、魚尾紋等動態表情紋的撫平，提升雙眉與嘴角、軟化頸部線條，以及國字臉咬肌、肩頸線條修飾與膚質調理（水光肉毒）等。\n\n注射過程僅有輕微扎針感，療程時間約 10 至 20 分鐘，術後無恢復期。提醒選購時務必認明瓶身標籤有「衛部菌疫輸字第000994號」與原廠授權標示，避免來路不明的水貨或仿冒品。",

              "V50 極濃玻尿酸": {
    licenseName: "『艾斯塔』可立美康圖爾玻尿酸 / 'AESTURA' CLEVIEL CONTOUR Dermal Implant",
    licenseNo: "衛署醫器輸字第030698號",
    desc: "V50 極濃玻尿酸（CLEVIEL 可立美）由韓國 No.1 護膚化妝品集團愛茉莉太平洋（AMOREPACIFIC）的專業團隊耗時 5 年、超過數百名專家研發，並由璦絲特蘭（AESTURA）製造，通過韓國 KFDA、歐盟 CE 及台灣 TFDA 認證。因擁有同類產品中最高的玻尿酸濃度，被業界稱為「V50 玻尿酸」，是目前市面上濃度最高的玻尿酸之一，專為亞洲人立體輪廓塑形設計。\n\n▍全球最高 50mg/ml 濃度：高塑形力與持久度\nV50 最大的特色在於其突破性的 50mg/ml 高透明質酸濃度，比一般品牌玻尿酸高出約一倍。極高的濃度賦予其三大物理特性——高黏度、高彈性、高內聚力，使其在塑型時擁有強大的承托力，能精準堆疊出立體挺翹的鼻樑、下巴與飽滿輪廓，呈現如手術般精緻的效果，且因密度高不易被人體酵素分解，持久度遠優於一般玻尿酸，臨床文獻證實支撐度最久可維持約 24 個月（效果因個人體質而異）。\n\n▍4L 交聯技術：安全穩定不易位移\nV50 採用 CLEVIEL 專利的「4L 交聯技術」，這是首個獲得韓國保健福祉部頒發 NET 新創科技獎的透明質酸填充劑技術。4L 代表四大優勢：\n\n• Low BDDE（低化學交聯）：化學交聯程度低於 1%，其餘以天然物理方式形成自然鍵結，結構札實穩定、安全性高。\n• Low Temperature（低溫製程）：低溫環境製造，減少玻尿酸於製程中的降解，維持分子完整。\n• Low Swelling（低腫脹）：注射後不易因吸水而膨脹，大幅減低術後水腫、泛紅與過敏反應，恢復期短。\n• Long Duration（長效持久）：高密度透明質酸搭配穩定結構，使效果維持更久。\n\n▍高內聚力：精準塑形不變形\nV50 具有極高的內聚力，施打後不易擴散位移，即使受到外力擠壓或肌膚自身張力影響，也能迅速回復原狀、不易變形，特別適合需要強支撐與精準定位的中軸線部位（山根、鼻樑、下巴）及凹陷填補（頰凹、夫妻宮、太陽穴）。\n\n療程約 20 至 40 分鐘，注射後即有立即的豐盈塑形效果，因低腫脹特性術後腫脹輕微，約 2 至 3 天消退即可正常生活。效果一般可維持 12 至 24 個月，由醫師依個人輪廓條件與需求精準規劃注射部位與劑量。",

    info: [{ k: "療程時間", v: "約 20–40 分鐘" }, { k: "恢復期", v: "輕微腫脹 2–3 天" }, { k: "效果", v: "立即豐盈感" }, { k: "效果持續", v: "18–24 個月" }],
    notes: "【術前注意事項】\n・施打前請告知醫師用藥史（尤其抗凝血藥物如阿斯匹靈）及過敏史。\n・治療部位有感染、發炎、開放性傷口或皮膚疾病者，需康復後再進行。\n・孕婦、哺乳中、蟹足腫體質或自體免疫疾病者，請事先告知醫師評估。\n・一個月內若於治療部位施打過其他填充物或進行雷射光療，請事先告知醫師。\n・治療前一週避免飲酒及服用易導致瘀青的保健品（如魚油、維他命E）。\n\n【術後注意事項】\n・術後注射部位可能有輕微泛紅、腫脹或瘀青，屬正常現象，通常 2 至 3 天內逐漸消退。\n・術後一週內避免按壓、揉搓注射部位（除非醫師指示），避免高溫環境（三溫暖、泡溫泉）及激烈運動。\n・術後 24 小時內注射部位避免上妝，並加強保濕與防曬。\n・術後一週內避免趴睡或側睡壓迫注射部位，以免影響塑形效果。\n・若出現異常腫脹、劇痛、皮膚變白或視力異常，請立即回診由醫師評估。"

  "Juvelook 喬雅露": {
    licenseName: "『芳蜜』喬雅露軟組織注射植入物 / “VAIM” Juvelook Soft Tissue Injectable Implant",
    licenseNo: "衛部醫器輸字第037021號",
    desc: "Juvelook 喬雅露是一款結合 PDLLA（聚雙旋乳酸）與非交聯玻尿酸 HA 的軟組織注射植入物，常被稱為新童妍或素顏針。它的設計重點不是單純把組織撐大，而是透過微球體在皮膚與皮下組織中形成溫和刺激，啟動纖維母細胞生成膠原蛋白，同時藉由玻尿酸提供初期保濕與柔順度，讓膚質改善更自然、漸進。\n\n▍療程特色\n喬雅露的 PDLLA 微球具有多孔性結構，能在注射後逐步被人體代謝，同時刺激周圍膠原新生。與傳統填充劑相比，它更適合處理膚質粗糙、毛孔粗大、細紋、痘疤凹洞、輕度凹陷與整體彈性下降等問題。臨床規劃上可依膚況選擇較表淺的水光式打法，改善膚質與細紋；或針對局部凹陷、痘疤與輪廓流失進行較精準的點狀補強。\n\n▍Juvelook 200mg\n200mg 劑型適合需要較完整膠原刺激與較大範圍膚質改善的族群，常用於全臉、臉頰、太陽穴、痘疤凹陷、毛孔粗大或膚質鬆散等規劃。因粉量較高，醫師可依需求調整稀釋濃度與施打層次，用於較大面積的膚質更新或局部凹陷補強。若目標是改善膚況、細緻毛孔、淡化凹洞與增加膚彈性，200mg 通常更適合作為完整療程規劃。\n\n▍Juvelook 50mg\n50mg 劑型適合較精細、小範圍或初次體驗的規劃，常用於眼周細紋、頸紋、局部淺層紋理、輕度凹陷或希望以較溫和方式觀察反應者。因劑量較小，適合在皮膚較薄、需要精準控制的部位做細緻修飾，也可作為全療程中的局部加強。實際選擇 200mg 或 50mg，仍須由醫師依膚況、施打部位、目標效果與安全層次評估。\n\n▍適合族群\n適合希望皮膚變得更細緻、澎潤、有光澤，但不想追求明顯填充感的人。若有痘疤、毛孔、眼周細紋、頸紋、臉頰輕度凹陷或膚況鬆散，也可由醫師評估是否適合搭配其他雷射、電音波或保養療程。\n\n▍療程規劃\n療程前會先評估皮膚厚度、凹陷深度、膚質與是否有發炎痘痘。施打時可搭配麻膏與冰敷降低不適，療程約 30 至 40 分鐘。多數人需要 2 至 3 次為一個療程，每次間隔約 4 週，效果會在數週至數月內逐漸呈現，膚質、細紋與彈性改善通常比單次填充更自然。",
    suitable: "膚質粗糙、毛孔粗大、細紋、輕度凹陷、想自然漸進改善膚質與膠原流失者。",
    info: [{ k: "療程時間", v: "約 30–40 分鐘" }, { k: "恢復期", v: "輕微紅腫 1–3 天" }, { k: "建議次數", v: "2–3 次一療程" }, { k: "間隔時間", v: "每次間隔 4 週" }],
    notes: "【術前注意事項】\n・施打前請完整告知醫師疾病史、過敏史、用藥史與過往醫美治療史，尤其是抗凝血藥、阿斯匹靈、魚油、銀杏、維他命 E 等可能增加瘀青風險的藥物或保健品。\n・治療部位若有發炎痘痘、感染、皰疹、濕疹、開放性傷口或近期雷射換膚尚未恢復，應暫緩施打。\n・孕婦、哺乳中、自體免疫疾病、凝血功能異常、蟹足腫或容易形成結節、傷口癒合異常者，請務必由醫師評估。\n・曾於同部位施打玻尿酸、膠原刺激劑、埋線或手術者，請告知產品名稱與施作時間。\n・療程前一週建議避免飲酒、熬夜與過度日曬，療程當日保持臉部清潔，避免濃妝。\n\n【術後注意事項】\n・術後可能有針孔、泛紅、腫脹、瘀青、丘疹感或短暫顆粒感，多數會於數日至 1 週內逐漸緩解。\n・術後 24 小時內避免上妝、飲酒、劇烈運動與觸摸針孔，並保持治療部位清潔。\n・若醫師有指示按摩，請依指定方式與頻率進行；未經醫師指示請勿自行大力揉壓。\n・術後一週內避免三溫暖、烤箱、泡溫泉、游泳、長時間曝曬與刺激性保養品，並加強保濕與防曬。\n・效果屬漸進式膠原新生，請依療程規劃回診追蹤；若硬塊、紅腫、疼痛或感染徵象持續，請立即回診。"

    notes: "【術前注意事項】\n・施打前請完整告知醫師疾病史、過敏史、用藥史與過往醫美治療史，尤其是抗凝血藥物、阿斯匹靈、非類固醇止痛藥、魚油、銀杏、維他命 E 等可能增加瘀青風險的藥物或保健品。\n・曾於同部位施打玻尿酸、再生針、聚左旋乳酸、埋線或手術者，請告知產品名稱、施作時間與是否曾有結節或發炎反應。\n・治療部位若有感染、發炎、皰疹、濕疹、開放性傷口或近期雷射換膚尚未恢復，應暫緩施打。\n・孕婦、哺乳中、自體免疫疾病、凝血功能異常、蟹足腫或傷口癒合異常體質者，請務必由醫師審慎評估。\n・曾對玻尿酸、利多卡因、填充物成分或植入劑過敏者，需事先告知；若有嚴重過敏史，請攜帶相關醫療資料供醫師判斷。\n・治療前一週建議避免飲酒、熬夜及過度日曬，療程當日請保持臉部清潔，避免濃妝。\n\n【術後注意事項】\n・術後可能有針孔、泛紅、腫脹、壓痛、瘀青、暫時性不平整或局部硬塊感，多數會於數日至 1 至 2 週內逐漸改善。\n・術後 24 小時內避免上妝、飲酒、劇烈運動與觸摸針孔，並保持治療部位清潔。\n・術後一週內避免按壓、揉捏、趴睡、臉部按摩或使用會壓迫治療區域的美容儀器；若醫師針對再生針部位有指定按摩方式，請依醫囑執行。\n・術後兩週內避免三溫暖、烤箱、蒸氣浴、泡溫泉、長時間曝曬及極冷或極熱環境，並加強保濕與防曬。\n・再生針的膠原新生屬漸進式變化，初期腫脹消退後可能覺得效果變自然，後續緊緻與支撐感會隨時間逐步呈現。\n・若出現劇烈疼痛、皮膚變白或發紫、網狀斑、視力異常、持續惡化腫脹、疑似感染或硬塊持續不退，請立即回診或聯絡醫療團隊。"

    notes: "【術前注意事項】\n・治療前一週請停用外用 A 酸藥膏及含酸類（果酸、水楊酸）、美白等刺激性保養品。\n・治療前一週避免做雷射、換膚等其他療程，並避免曝曬，皮膚過度曬黑者建議延後 2 至 3 個月再治療。\n・治療血管性病灶時通常不建議使用麻藥，因麻藥會使血管收縮、影響治療效果。\n・以下情況不適合施打，請務必事先告知醫師評估：懷孕婦女、癲癇患者、疤痕（蟹足腫）體質、服用光敏感藥物或口服 A 酸者、正在接受抗凝血或免疫抑制治療者、治療區域有皰疹、感染、開放性傷口或癌前病變者。\n\n【術後注意事項】\n・術後治療部位可能出現暫時性泛紅、輕微水腫或搔癢感，屬正常反應，通常 1 至 3 天內消退，請勿搔抓。\n・血管瘤、葡萄酒色斑治療後局部顏色會暫時加深（暗紅或深棕色）或出現飛梭狀結痂，約 1 至 2 週逐漸恢復，請勿摳除結痂。\n・術後建議 24 小時內不要化妝，讓皮膚充分休息。\n・術後請加強保濕（使用成分單純的保濕產品）並做好防曬（SPF50+），避免色素沉澱。\n・術後一週內避免高溫環境（三溫暖、泡溫泉）、激烈運動及飲酒，以免加重泛紅。"

  "海神雷射除毛": {

    desc: "海神雷射除毛（TRITON）由以色列 InMode 公司研發，同時通過美國 FDA 及台灣衛福部 TFDA 雙重認證，是目前市場上技術最先進的複合波長醫療級除毛雷射儀器之一。有別於傳統單一波長除毛雷射，海神採用「雙波長同步輸出」技術，將兩種最熱門的除毛雷射波長整合於同一探頭，搭配獨家 3P 三重散熱冷卻系統，在更高效率、更廣泛適用範圍的同時，大幅提升療程的舒適度與安全性。\n\n▍雙波長同步技術：一次處理所有毛髮類型\n海神除毛最核心的技術優勢在於同時結合兩種波長：\n\n• 755nm 亞歷山大雷射：穿透深度較淺，對毛囊黑色素的吸收效率極高，特別適合淺色皮膚與較細的毛髮，對細毛的破壞力最強，是傳統除毛雷射的主力波長。\n\n• 810nm 二極體雷射：穿透深度介於 755nm 與 1064nm 之間，能更深入到毛囊根部，對較深膚色與粗毛有更佳的安全性與效果，是目前安全性與效率兼具的黃金波長。\n\n兩種波長同步作用，能同時針對「新生毛囊」（生長期，對雷射最敏感）與「深層毛囊」（不同生長週期階段）一併破壞，大幅縮短完整療程所需次數，對於細小毛髮、淺色毛髮或小麥膚色等傳統單波長雷射較難處理的情況，也能提供安全有效的治療效果。\n\n▍毛髮生長週期與療程規劃\n毛髮有固定的生長週期，分為「生長期」（Anagen）、「衰退期」（Catagen）與「休止期」（Telogen）三個階段。雷射除毛只對生長期的毛囊有效，因此需要多次療程才能在毛髮陸續進入生長期時逐一破壞，通常建議 6 至 8 次為一完整療程，每次間隔 4 至 6 週，依部位毛髮密度與個人體質由醫師評估調整。\n\n▍3P 三重散熱冷卻技術：近乎無痛的舒適療程\n傳統雷射除毛最令人卻步的是明顯的疼痛感與術後紅腫。海神除毛搭載獨家 3P 專利冷卻系統，透過三個階段全程保護肌膚：預冷板（Pre-Cooling Plate）在治療前預先冷卻皮膚，藍寶石尖端平行冷卻（Parallel Cooling）在治療中即時散熱，冷卻後板（Post-Cooling Plate）在治療後持續帶走多餘熱能。三重冷卻確保肌膚全程維持安全溫度，有效避免術後熱脹與反黑，使治療過程近乎無痛，私密處除毛（VIO）不需上麻藥也能舒適完成，是目前舒適度最高的醫療級除毛選擇之一。\n\n療程時間依部位大小約 10 至 60 分鐘，無恢復期，完整療程通常為 6 至 8 次，每次間隔 4 至 6 週，詳細療程次數由醫師依個人毛髮密度與膚況評估規劃。",
    suitable: "腋下、比基尼線、腿部等各部位多餘體毛；各種膚色均適用。",
    info: [{ k: "療程時間", v: "依部位 10–60 分鐘" }, { k: "恢復期", v: "幾乎無" }, { k: "建議次數", v: "6–8 次一療程" }, { k: "間隔時間", v: "每次間隔 4–6 週" }],
    notes: "【術前注意事項】\n・療程前一個月：停止蜜蠟除毛、連根拔除（電解、夾毛）等方式，以免影響雷射對毛囊的作用效果。\n・療程前一週：停止使用含酸類（果酸、水楊酸、A酸）、美白、去角質等刺激性保養品及口服 A 酸。\n・療程前一週：治療部位避免日光浴及過度日曬，膚色較深時建議告知醫師評估能量。\n・療程當日：治療前請自行剃除治療部位體毛（留毛根），以提升雷射能量的精準吸收效率。\n・有特殊病史、正在服用藥物（尤其光敏感藥物）、免疫系統異常或懷孕者，請提前告知醫師評估。\n\n【術後注意事項】\n・治療後 48 小時內：避免泡澡、三溫暖、蒸氣浴及激烈運動流汗，以免刺激治療部位。\n・治療後請加強保濕，使用溫和無刺激性的乳液，避免含酸類、酒精或香料的產品。\n・外出請做好防曬（SPF50+），避免紫外線照射造成色素反黑。\n・治療後若有輕微紅腫、微熱感或癢感，屬正常現象，請勿用手搔抓，可輕拍鎮定或冰敷緩解。\n・治療後毛髮不會立即消失，約 1 至 3 週後毛髮會逐漸自然脫落，屬正常代謝過程，請勿強行拔除。"

  "猛健樂瘦瘦筆": {

    desc: "猛健樂（Mounjaro®，主成分 Tirzepatide）是全球第一個雙重腸泌素受體促效劑（Dual Incretin Receptor Agonist），由美國禮來藥廠（Eli Lilly）研發，2022 年獲美國 FDA 核准用於第二型糖尿病治療，2023 年於台灣衛福部正式核准上市，現核准適應症涵蓋「糖尿病血糖控制及肥胖與過重之體重控制」。以每週一次筆型皮下注射的方式使用，是目前臨床數據最強效的減重藥物之一。\n\n▍雙重腸泌素機轉：GLP-1 ＋ GIP 同步作用\n猛健樂與傳統瘦瘦筆（如 Ozempic、Saxenda）最關鍵的差異在於它同時活化兩種腸泌素受體：\n\n• GLP-1 受體（類升糖素胜肽-1）：延緩胃排空、抑制食慾、刺激胰島素分泌、抑制昇糖素，讓飽足感更持久、進食量自然減少。\n\n• GIP 受體（葡萄糖依賴型胰島素釋放胜肽）：強化胰島素敏感性，直接促進白色脂肪分解並轉為能量利用，同時能減緩傳統 GLP-1 藥物常見的腸胃不適副作用。\n\n雙重機轉協同作用，讓猛健樂在減少食慾、促進代謝、改善血糖三方面同時發揮作用，減重效果顯著優於單一 GLP-1 藥物。根據 SURMOUNT 大型臨床試驗，高達 40% 的使用者在 72 週內體重減少超過 20%，是目前非手術減重中最具臨床證據支持的藥物選擇。\n\n▍劑量漸進規劃\n猛健樂採「漸進式增量」策略，起始劑量為每週 2.5mg，通常每 4 週依耐受性與目標逐步調升，最高可至 15mg/週。每支 KwikPen 筆型注射器內含 4 週劑量，須由醫師評估處方，不可自行購買或調整劑量。療程通常持續 3 至 6 個月以上可看到顯著成效，需搭配飲食調整與規律運動以鞏固並維持成果。\n\n目前非糖尿病患者使用屬「適應症外使用（Off-label）」，全自費，無健保給付，須經正規醫療院所醫師親自診療、身體評估後開立處方，合法取得原廠冷鏈完整的藥品，請勿向來路不明管道購買，以確保藥效與用藥安全。",

    info: [{ k: "使用方式", v: "皮下注射，每週一次" }, { k: "需求評估", v: "需醫師問診" }, { k: "預期效果", v: "3–6 個月見成效" }, { k: "搭配建議", v: "飲食＋運動調整" }],
    notes: "【術前注意事項】\n・猛健樂屬處方藥物，須經醫師親自診療與評估後才可取得，切勿自行購買或使用來路不明藥品。\n・使用前請告知醫師所有用藥史，尤其是其他糖尿病藥物（胰島素、Sulfonylureas 等），以免低血糖風險。\n・有甲狀腺髓樣癌（MTC）個人或家族病史、多發性內分泌腫瘤第 2 型（MEN2）者禁用。\n・有急性胰臟炎病史者使用前須告知醫師評估。\n・孕婦、哺乳中、備孕中女性不適合使用，使用期間應採取有效避孕措施。\n・有嚴重腎功能或肝功能異常者，需由醫師謹慎評估。\n\n【術後注意事項】\n・每週固定同一天皮下注射，可注射於腹部、大腿或上臂，每次換不同部位輪替。\n・若超過 4 天忘記施打，請直接跳過該次，於下一次正常時間施打，切勿補打兩倍劑量。\n・4 週打完後筆內有殘餘藥量屬正常，切勿使用剩餘藥量，應直接丟棄整支筆。\n・藥品需冷藏保存（2–8°C），避免冷凍、避免陽光直射。\n・初期可能出現噁心、嘔吐、腹瀉、便秘等腸胃不適，屬常見副作用，通常隨時間適應改善，如症狀嚴重請回診告知醫師調整劑量。\n・療程需搭配飲食控制與規律運動，以達到最佳減重成效並維持長期效果。"

// ── Init ──
function init() {
  renderConcernGrid();
  renderTypeList();
}

function renderConcernGrid() {
  const grid = document.getElementById('concern-grid');
  grid.innerHTML = KEYWORD_GROUPS.map(group => `
    <div class="keyword-section">
      <div class="keyword-section-title">${group.name}</div>
      <div class="keyword-chip-grid">
        ${group.keywords.map(keyword => {
          const count = getTreatmentsByKeyword(keyword).length;
          if (!count) return '';
          return `<div class="keyword-chip" onclick="openKeyword('${keyword.replace(/'/g,"\\'")}')">
            <span>${keyword}</span><span class="keyword-count">${count}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function renderCategoryList() {
  const list = document.getElementById('category-list');
  list.innerHTML = DATA.categories.filter(cat => (cat.group || 'concern') === 'concern').map(cat => {
    const total = new Set(cat.subcategories.flatMap(sc => sc.treatments.map(t => t.name))).size;
    return `
      <div class="category-item" onclick="openCategory('${cat.id}')">
        <div class="cat-left">
          <span class="cat-icon">${cat.icon}</span>
          <div>
            <div class="cat-name">${cat.name}</div>
            <div class="cat-count">${cat.concern} · ${total} 項療程</div>
          </div>
        </div>
        <span class="cat-arrow">›</span>
      </div>`;
  }).join('');
}

function renderTypeList() {
  const list = document.getElementById('category-list-type');
  list.innerHTML = DATA.categories.filter(cat => cat.group === 'type').map(cat => {
    const total = new Set(cat.subcategories.flatMap(sc => sc.treatments.map(t => t.name))).size;
    return `
      <div class="category-item" onclick="openCategory('${cat.id}')">
        <div class="cat-left">
          <span class="cat-icon">${cat.icon}</span>
          <div>
            <div class="cat-name">${cat.name}</div>
            <div class="cat-count">${cat.concern} · ${total} 項療程</div>
          </div>
        </div>
        <span class="cat-arrow">›</span>
      </div>`;
  }).join('');
}

// ── Panel open/close ──
function openCategory(catId, defaultSubcat) {
  currentCatId = catId;
  const cat = DATA.categories.find(c => c.id === catId);
  currentPanelCat = cat;
  const subcategories = getDisplaySubcategories(cat);
  document.getElementById('panel-title').textContent = cat.name;
  currentSubcat = defaultSubcat || subcategories[0].name;
  renderSubcats(cat);
  renderTreatments(cat);
  document.getElementById('treatment-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('treatment-panel').classList.remove('open');
  document.body.style.overflow = '';
}

function getAllTreatments() {
  return uniqueTreatments(DATA.categories.flatMap(cat =>
    cat.subcategories.flatMap(sc => sc.treatments)
  ));
}

function getTreatmentsByKeyword(keyword) {
  return getAllTreatments().filter(t => t.tags.includes(keyword));
}

function openKeyword(keyword) {
  const treatments = getTreatmentsByKeyword(keyword);
  currentCatId = null;
  currentPanelCat = {
    id: `keyword-${keyword}`,
    name: keyword,
    subcategories: [{ name: '全部療程', treatments }]
  };
  currentSubcat = '全部療程';
  document.getElementById('panel-title').textContent = `關鍵字：${keyword}`;
  renderSubcats(currentPanelCat);
  renderTreatments(currentPanelCat);
  document.getElementById('treatment-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function uniqueTreatments(treatments) {
  const seen = new Set();
  return treatments.filter(t => {
    if (seen.has(t.name)) return false;
    seen.add(t.name);
    return true;
  });
}

function getDisplaySubcategories(cat) {
  let allTreatments = [];
  const subcategories = [];

  cat.subcategories.forEach(sc => {
    const name = sc.name === '全部顯示' ? '全部療程' : sc.name;
    allTreatments = allTreatments.concat(sc.treatments);
    if (name !== '全部療程') {
      subcategories.push({ ...sc, name });
    }
  });

  return [
    { name: '全部療程', treatments: uniqueTreatments(allTreatments) },
    ...subcategories
  ];
}

function renderSubcats(cat) {
  const wrap = document.getElementById('subcategory-wrap');
  const subcategories = getDisplaySubcategories(cat);
  wrap.innerHTML = `
    <div class="subcategory-label">選擇項目</div>
    <div class="chip-group">
      ${subcategories.map(sc => `
        <div class="chip ${sc.name === currentSubcat ? 'active' : ''}"
          onclick="selectSubcat('${sc.name}')">${sc.name}</div>
      `).join('')}
    </div>`;
}

function selectSubcat(name) {
  currentSubcat = name;
  const cat = currentPanelCat || DATA.categories.find(c => c.id === currentCatId);
  renderSubcats(cat);
  renderTreatments(cat);
}

function renderTreatments(cat) {
  let items = [];
  const subcategories = getDisplaySubcategories(cat);
  if (currentSubcat) {
    const sc = subcategories.find(s => s.name === currentSubcat);
    if (sc) items = sc.treatments.map(t => ({ ...t, subcat: sc.name }));
  } else {
    subcategories.forEach(sc => {
      sc.treatments.forEach(t => items.push({ ...t, subcat: sc.name }));
    });
  }

  const list = document.getElementById('treatment-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty-state">此分類暫無療程</div>';
    return;
  }
  list.innerHTML = items.map(t => {
    const key = t.name;
    const sel = selectedTreatments.has(key);
    return `
      <div class="treatment-card ${sel ? 'selected' : ''}" onclick="openDetail('${key.replace(/'/g,"\\'")}')">
        <div class="treatment-card-body">
          <div class="treatment-name">${t.name}</div>
          <div class="treatment-device">${t.device}</div>
          <div class="treatment-desc-short">${t.desc}</div>
          <div class="treatment-tags">${t.tags.map(tg => `<span class="tag">${tg}</span>`).join('')}</div>
        </div>
        <div class="treatment-card-right">
          <div class="card-detail-arrow">›</div>
          <div class="card-select-btn" onclick="event.stopPropagation(); toggleFromCard('${key.replace(/'/g,"\\'")}', this.closest('.treatment-card'))">${sel ? '✓' : '+'}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleFromCard(name, cardEl) {
  if (selectedTreatments.has(name)) {
    selectedTreatments.delete(name);
    cardEl.classList.remove('selected');
    cardEl.querySelector('.card-select-btn').textContent = '+';
  } else {
    selectedTreatments.add(name);
    cardEl.classList.add('selected');
    cardEl.querySelector('.card-select-btn').textContent = '✓';
  }
  updateActionBar();
}

// ── Detail Panel ──
function openDetail(name) {
  currentDetailKey = name;
  // Find treatment data
  let t = null;
  for (const cat of DATA.categories) {
    for (const sc of cat.subcategories) {
      t = sc.treatments.find(x => x.name === name);
      if (t) break;
    }
    if (t) break;
  }
  if (!t) return;

  const detail = getDetailData(name);
  document.getElementById('detail-panel-title').textContent = t.name;
  document.getElementById('detail-device').textContent = t.device;

    .replace(/\n\n/g, '<br><br>')
    .replace(/\n・/g, '<br>・')
    .replace(/\n•/g, '<br>•')
    .replace(/\n（/g, '<br>（')
    .replace(/\n/g, '<br>');

  }
  document.getElementById('detail-suitable').innerHTML = detail.suitable.replace(/\n/g, '<br>');
  document.getElementById('detail-info-grid').innerHTML = detail.info.map(i => `
    <div class="detail-info-item">
      <div class="detail-info-key">${i.k}</div>
      <div class="detail-info-val">${i.v}</div>
    </div>`).join('');
  document.getElementById('detail-notes').innerHTML = (detail.notes || '')
    .replace(/【([^】]+)】/g, '<strong>【$1】</strong>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n・/g, '<br>・')
    .replace(/\n/g, '<br>');

  // Update add button
  const addBtn = document.getElementById('detail-add-btn');
  const isSel = selectedTreatments.has(name);
  addBtn.textContent = isSel ? '✓ 已加入清單' : '加入諮詢清單';
  addBtn.classList.toggle('added', isSel);

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-action-bar').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-action-bar').classList.remove('visible');
  currentDetailKey = null;
}

function toggleFromDetail() {
  if (!currentDetailKey) return;
  const name = currentDetailKey;
  const addBtn = document.getElementById('detail-add-btn');
  if (selectedTreatments.has(name)) {
    selectedTreatments.delete(name);
    addBtn.textContent = '加入諮詢清單';
    addBtn.classList.remove('added');
  } else {
    selectedTreatments.add(name);
    addBtn.textContent = '✓ 已加入清單';
    addBtn.classList.add('added');
  }
  // Sync card in list
  const cat = currentPanelCat || DATA.categories.find(c => c.id === currentCatId);
  if (cat) renderTreatments(cat);
  updateActionBar();
}

async function sendSingleToLine() {
  if (!currentDetailKey) return;
  const msg = `您好，我想了解「${currentDetailKey}」療程的詳細資訊，請問方便為我安排諮詢嗎？`;
  trackMetaLead([currentDetailKey]);
  if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
    try {
      await liff.sendMessages([{ type: 'text', text: msg }]);
      liff.closeWindow();
    } catch(e) { showToast('傳送失敗，請再試一次'); }
  } else {
    showToast('（預覽）已傳送：' + currentDetailKey);
    console.log('LINE message:', msg);
  }
}

function updateActionBar() {
  const bar = document.getElementById('action-bar');
  const count = selectedTreatments.size;
  if (count === 0) {
    bar.classList.remove('visible');
    return;
  }
  bar.classList.add('visible');
  document.getElementById('selected-count-label').textContent = `已選擇 ${count} 項療程`;
  const names = Array.from(selectedTreatments);
  document.getElementById('selected-names').textContent = names.join('、');
}

// ── Tab switch ──
function switchTab(tab) {
  const order = ['type', 'concern'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', order[i] === tab);
  });
  document.getElementById('view-concern').classList.toggle('active', tab === 'concern');
  document.getElementById('view-type').classList.toggle('active', tab === 'type');
}

// ── LIFF Send ──
async function sendToLine() {
  const names = Array.from(selectedTreatments);
  if (!names.length) return;

  const lines = names.map(n => `・${n}`).join('\n');
  const msg = `您好，我想了解以下療程的詳細資訊：\n\n${lines}\n\n請問方便為我安排諮詢嗎？`;
  trackMetaLead(names);

  // LIFF 環境
  if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
    try {
      await liff.sendMessages([{ type: 'text', text: msg }]);
      liff.closeWindow();
    } catch(e) {
      showToast('傳送失敗，請再試一次');
    }
  } else {
    // 開發預覽
    showToast('（預覽）訊息已準備：' + names.join('、'));
    console.log('LINE message:', msg);
  }
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function trackMetaLead(treatments) {
  if (typeof fbq !== 'function') return;
  fbq('track', 'Lead', {
    content_name: 'LINE consultation',
    content_category: 'treatment inquiry',
    content_ids: treatments,
    num_items: treatments.length
  });
}

// ── LIFF Init ──
const LIFF_ID = '2009700669-CLbpM9oy';
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
  } catch(e) {
    console.warn('LIFF init skipped (dev mode)');
  }
}

init();
initLiff();
</script>

</html>
